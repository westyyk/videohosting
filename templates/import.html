<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Импорт видео</title>
</head>

<body style="margin:0; font-family:system-ui; background:#f5f5f5;">

<header style="background:#223C35; padding:16px 20px;">
    <a href="/"
       style="color:#fff; text-decoration:none; font-size:20px; font-weight:700;">
        ← На главную
    </a>
</header>

<main style="max-width:700px; margin:40px auto; background:#fff; padding:30px; border-radius:16px;">

    <h1 style="margin-top:0;">Импорт видео</h1>

    <form method="POST">

        <div style="margin-bottom:18px;">
            <label style="display:block; margin-bottom:8px; font-weight:600;">
                Ссылка на видео
            </label>

            <input
                type="url"
                name="video_url"
                required
                placeholder="https://youtube.com/..."
                style="width:100%; padding:12px; border-radius:10px; border:1px solid #ccc;"
            >
        </div>

        <div style="margin-bottom:18px;">
            <label style="display:block; margin-bottom:8px; font-weight:600;">
                Название
            </label>

            <input
                type="text"
                name="title"
                placeholder="Название видео"
                style="width:100%; padding:12px; border-radius:10px; border:1px solid #ccc;"
            >
        </div>

        <div style="margin-bottom:20px;">
            <label style="display:block; margin-bottom:8px; font-weight:600;">
                Описание
            </label>

            <textarea
                name="description"
                rows="5"
                placeholder="Описание видео"
                style="width:100%; padding:12px; border-radius:10px; border:1px solid #ccc; resize:vertical;"
            ></textarea>
        </div>

        <button
            type="submit"
            style="background:#223C35; color:#fff; border:none; padding:12px 20px; border-radius:10px; cursor:pointer; font-size:15px;">
            Импортировать
        </button>

    </form>

</main>

</body>
</html>
