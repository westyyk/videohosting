<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>VimeoTech</title>
</head>

<body style="margin:0; padding:0; background:#F5F5F5; font-family:system-ui;">

<header style="display:flex; align-items:center; justify-content:space-between; padding:14px 20px; background:#223C35; color:#fff; position:sticky; top:0;">

  <div style="display:flex; align-items:center; gap:12px;">

    <a href="/" style="color:#fff; text-decoration:none;">
      <h1 style="margin:0; font-size:18px;">VimeoTech</h1>
    </a>

    <a href="/team" style="color:#fff; text-decoration:none; padding:6px 10px; border:1px solid rgba(255,255,255,.3); border-radius:999px;">
      Команда
    </a>

    <a href="/agreement" style="color:#fff; text-decoration:none; padding:6px 10px; border:1px solid rgba(255,255,255,.3); border-radius:999px;">
      Соглашение
    </a>

  </div>

  <div style="flex:1; display:flex; justify-content:center;">
    <input placeholder="Поиск..."
      style="width:60%; padding:10px 14px; border-radius:999px; border:none;">
  </div>

  <div>

    {% if user %}
      <div style="position:relative; display:inline-block;">

        <button id="userToggle"
          style="background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.35); padding:8px 12px; border-radius:999px; cursor:pointer;">

          {{ user.username }}
          <span style="margin-left:6px;">▾</span>
        </button>

        <div id="userDropdown" hidden
          style="position:absolute; right:0; top:110%; background:#fff; color:#000; border-radius:8px; min-width:160px;">

          <a href="/profile" style="display:block; padding:10px; text-decoration:none; color:#333;">Профиль</a>
          <a href="/logout" style="display:block; padding:10px; text-decoration:none; color:#333;">Выйти</a>

        </div>
      </div>

    {% else %}

      <a href="/login"
         style="background:#fff; color:#223C35; padding:8px 14px; border-radius:999px; text-decoration:none; font-weight:600;">
        Войти
      </a>

    {% endif %}

  </div>
</header>


<main style="padding:20px; max-width:1200px; margin:0 auto;">
  <h2>Главная</h2>
</main>


<script>
const btn = document.getElementById("userToggle");
const menu = document.getElementById("userDropdown");

if (btn) {
  btn.onclick = () => {
    menu.hidden = !menu.hidden;
  };

  document.addEventListener("click", (e) => {
    if (!btn.contains(e.target) && !menu.contains(e.target)) {
      menu.hidden = true;
    }
  });
}
</script>

</body>
</html>
